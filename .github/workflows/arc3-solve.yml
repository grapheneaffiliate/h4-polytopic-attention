name: ARC-AGI-3 Solution Executor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: solutions-only, explorer-only, or combined'
        required: false
        default: 'combined'
      explorer:
        description: 'Explorer version for unsolved games (v6t, v6, v5_ucb, v4)'
        required: false
        default: 'v6'
      max_actions:
        description: 'Max actions per game for explorer'
        required: false
        default: '200000'

jobs:
  arc3-solve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/polytopic-attention-implementation-XHkL3

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install arc-agi arcengine scipy numpy

      - name: Execute pre-computed solutions
        if: inputs.mode != 'explorer-only'
        env:
          ARC_API_KEY: "58b421be-5980-4ee8-8e57-0f18dc9369f3"
          PYTHONIOENCODING: utf-8
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== Executing pre-computed solutions ==="
          python scripts/execute_solutions.py 2>&1 | tee solution_results.txt

      - name: Run explorer on remaining games
        if: inputs.mode != 'solutions-only'
        env:
          ARC_API_KEY: "58b421be-5980-4ee8-8e57-0f18dc9369f3"
          PYTHONIOENCODING: utf-8
          PYTHONPATH: ${{ github.workspace }}
        run: |
          EXPLORER="${{ github.event.inputs.explorer }}"
          echo "=== Running explorer $EXPLORER on remaining games ==="
          if [ "$EXPLORER" = "v6" ]; then
            python olympus/arc3/explorer_v6_adaptive.py 2>&1 | tee explorer_results.txt
          else
            python olympus/arc3/explorer_v6_tuned.py 2>&1 | tee explorer_results.txt
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arc3-results
          path: |
            solution_results.txt
            explorer_results.txt
