name: ARC-AGI-3 Solution Executor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: combined (solutions+explorer), solutions-only, or explorer-only'
        required: false
        default: 'combined'
      max_actions:
        description: 'Max actions per game for explorer'
        required: false
        default: '200000'

jobs:
  arc3-solve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/harness-pattern

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install arc-agi arcengine scipy numpy

      - name: Run combined solver
        env:
          ARC_API_KEY: "58b421be-5980-4ee8-8e57-0f18dc9369f3"
          PYTHONIOENCODING: utf-8
          PYTHONPATH: ${{ github.workspace }}
          MAX_ACTIONS: ${{ github.event.inputs.max_actions }}
          SOLUTIONS_ONLY: ${{ inputs.mode == 'solutions-only' && 'true' || 'false' }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          echo "=== ARC-AGI-3 Combined Run ==="
          echo "Mode: $MODE"
          echo "Max actions: $MAX_ACTIONS"
          echo ""

          if [ "$MODE" = "explorer-only" ]; then
            echo "Running explorer v6 only..."
            python olympus/arc3/explorer_v6_adaptive.py 2>&1 | tee combined_results.txt
          else
            echo "Running combined (solutions + explorer)..."
            python scripts/run_combined.py 2>&1 | tee combined_results.txt
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arc3-results
          path: combined_results.txt
